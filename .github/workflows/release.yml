name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Build (arm64 + x86_64)
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/invoice-printer \
            target/x86_64-apple-darwin/release/invoice-printer \
            -output invoice-printer
      - name: Fetch pdfium and build universal dylib
        run: |
          set -e
          BASE=https://github.com/bblanchon/pdfium-binaries/releases/latest/download
          curl -L --fail -o arm64.tgz "$BASE/pdfium-mac-arm64.tgz"
          curl -L --fail -o x64.tgz  "$BASE/pdfium-mac-x64.tgz"
          ls -l arm64.tgz x64.tgz
          file arm64.tgz x64.tgz
          mkdir -p tmp/arm64 tmp/x64
          tar xzf arm64.tgz -C tmp/arm64
          tar xzf x64.tgz  -C tmp/x64
          lipo -create tmp/arm64/lib/libpdfium.dylib tmp/x64/lib/libpdfium.dylib -output libpdfium.dylib
      - name: Assemble package
        run: |
          set -e
          mkdir -p invoice-printer-mac
          cp invoice-printer invoice-printer-mac/
          cp libpdfium.dylib invoice-printer-mac/
          cp packaging/run.command invoice-printer-mac/
          chmod +x invoice-printer-mac/run.command
          # lipo 合并 dylib 会破坏原有签名，必须 --force 重签，否则 macOS AMFI 拒绝加载
          codesign --force --sign - invoice-printer-mac/invoice-printer invoice-printer-mac/libpdfium.dylib
          codesign --verify -vv invoice-printer-mac/libpdfium.dylib
          ditto -c -k --keepParent invoice-printer-mac invoice-printer-mac.zip
      - uses: actions/upload-artifact@v4
        with:
          name: invoice-printer-mac
          path: invoice-printer-mac.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: invoice-printer-mac.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Fetch pdfium
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $base = 'https://github.com/bblanchon/pdfium-binaries/releases/latest/download'
          Invoke-WebRequest -Uri "$base/pdfium-win-x64.tgz" -OutFile pdfium.tgz
          Get-Item pdfium.tgz | Select-Object Name,Length
          New-Item -ItemType Directory -Force -Path tmp | Out-Null
          tar xzf pdfium.tgz -C tmp
          if (-not (Test-Path tmp/bin/pdfium.dll)) { throw "pdfium.dll not found after extract" }
      - name: Assemble package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path invoice-printer-win | Out-Null
          Copy-Item target/release/invoice-printer.exe invoice-printer-win/
          Copy-Item tmp/bin/pdfium.dll invoice-printer-win/
          Copy-Item packaging/run.bat invoice-printer-win/
          Compress-Archive -Path invoice-printer-win -DestinationPath invoice-printer-win.zip
      - uses: actions/upload-artifact@v4
        with:
          name: invoice-printer-win
          path: invoice-printer-win.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: invoice-printer-win.zip
